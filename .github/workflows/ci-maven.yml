name: CI Maven

on:
  push:
    branches:
      - '**'
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '25'
          cache: 'maven'

      - name: Build && Install amoeba-maven
        run: cd tools/buildtools/java/amoeba-maven && ./mvnw install -B

      - name: Build && Install amoeba-external
        run: cd infrastructure/external/java/amoeba-external && ./mvnw install -B

      - name: Build && Install amoeba-spring-boot
        run: cd infrastructure/framework/java/amoeba-spring-boot && ./mvnw install -B

      - name: Build && Install amoeba-specification-component
        run: cd specification/component/java/amoeba-specification-component && ./mvnw install -B

      - name: Build && Install amoeba-specification-pipeline
        run: cd specification/pipeline/java/amoeba-specification-pipeline && ./mvnw install -B

      - name: Build && Install amoeba-spring-boot-component
        run: cd infrastructure/component/java/amoeba-spring-boot-component && ./mvnw install -B
